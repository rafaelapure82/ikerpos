version: '3.8'

services:
  ikerpos:
    build: .
    container_name: ikerpos
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PUERTO=3000
      - DATABASE_URL=file:/app/data/dev.db
      - NODE_ENV=production
    volumes:
      - ikerpos_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ikerpos_data:
